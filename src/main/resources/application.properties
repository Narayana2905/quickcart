# =========================================
# APPLICATION
# =========================================
spring.application.name=product-service

server.port=8080


# =========================================
# MYSQL DATABASE
# =========================================
# spring.datasource.url=jdbc:mysql://localhost:3306/product_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# spring.datasource.username=app_user
# spring.datasource.password=app_password

# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# =========================================
# H2 DATABASE - FILE STORAGE
# =========================================

# Windows example:
spring.datasource.url=jdbc:h2:file:C:/data/product-service/db/productdb;AUTO_SERVER=TRUE
spring.h2.console.settings.web-allow-others=true
server.forward-headers-strategy=framework
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
# =========================================
# JPA / HIBERNATE
# =========================================
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN

jwt.secret=quickcart-dev-secret-key-change-this-in-production-min-256-bits

# --- Stage 3 only (OAuth2) — comment out for Stage 1/2 ---
# spring.security.oauth2.resourceserver.jwt.issuer-uri=https://your-oauth-provider.com/realms/quickcart
# spring.security.oauth2.client.registration.google.client-id=YOUR_CLIENT_ID
# spring.security.oauth2.client.registration.google.client-secret=YOUR_CLIENT_SECRET
# spring.security.oauth2.client.registration.google.scope=openid,email,profile
# =========================================
# OPENAPI / SWAGGER
# =========================================
springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.path=/swagger-ui.html


# =========================================
# ACTUATOR - Optional
# =========================================
# Add spring-boot-starter-actuator if required
# management.endpoints.web.exposure.include=health,info